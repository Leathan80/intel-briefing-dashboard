<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Builder — Intel Briefing Dashboard</title>
<!-- Vendored locally (vendor/) — this tool must work fully offline, no CDN dependency. -->
<link rel="stylesheet" href="vendor/leaflet.css">
<script src="vendor/leaflet.js"></script>
<script src="vendor/pptxgen.bundle.js"></script>
<style>
  :root {
    --bg: #f3f5f9; --card: #ffffff; --border: #d9e1ec;
    --navy: #10294a; --navy-2: #1d4e89; --text: #22324a; --muted: #5d6f88;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Calibri, sans-serif; min-height: 100vh; }

  .header { background: var(--navy); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
  .header-sub { font-size: 11px; color: #9fc0e8; margin-top: 3px; }
  .back-link { font-size: 11px; color: #cfe0f5; text-decoration: none; border: 1px solid #ffffff33; padding: 5px 12px; border-radius: 3px; font-weight: 600; }
  .back-link:hover { background: #ffffff18; }

  .wrap { max-width: 1500px; margin: 0 auto; padding: 20px 24px; }
  .step-title { font-size: 12px; color: var(--navy-2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin: 22px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .step-num { background: var(--navy-2); color: #fff; width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; }

  .sel-layout { display: grid; grid-template-columns: 1.15fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 950px) { .sel-layout { grid-template-columns: 1fr; } }

  .box { background: var(--card); border: 1px solid var(--border); border-radius: 6px; }
  .box-head { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .box-body { padding: 12px 14px; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  select, input[type="text"], textarea { font: inherit; font-size: 12px; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; background: #fff; }
  select:focus, input:focus, textarea:focus { outline: 2px solid #bcd3ee; }
  textarea { width: 100%; resize: vertical; }

  .src-tabs { display: flex; gap: 4px; }
  .src-tab { font-size: 10px; font-weight: 700; padding: 5px 10px; border-radius: 4px; cursor: pointer; color: var(--muted); background: #eef2f7; text-transform: uppercase; letter-spacing: 0.4px; }
  .src-tab.active { background: var(--navy-2); color: #fff; }

  .src-list { max-height: 420px; overflow-y: auto; }
  .src-item { display: flex; gap: 8px; align-items: flex-start; padding: 8px 6px; border-bottom: 1px solid #eef2f7; font-size: 11.5px; line-height: 1.45; }
  .src-item:last-child { border-bottom: none; }
  .src-item .txt { flex: 1; }
  .src-item .meta { color: var(--muted); font-size: 10px; }
  .add-btn { flex-shrink: 0; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: #eef3fa; color: var(--navy-2); border-radius: 4px; padding: 3px 9px; cursor: pointer; }
  .add-btn:hover { background: var(--navy-2); color: #fff; }
  .add-btn.added { background: #e6f2e6; color: #2e7d32; border-color: #bcd9bc; cursor: default; }
  .src-item-coa { background: #f5f8fc; }
  .coa-tag { font-size: 9px; font-weight: 700; color: var(--navy-2); text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; }
  .coa-preview { font-style: italic; color: var(--muted); }

  .badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

  .tray-item { border: 1px solid var(--border); border-left: 4px solid var(--navy-2); border-radius: 5px; padding: 10px 12px; margin-bottom: 10px; background: #fbfcfe; }
  .tray-item-coa { border-left-color: #9a7b00; background: #fbf9f2; }
  .tray-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .pin-num { background: var(--navy-2); color: #fff; min-width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .tray-country { font-size: 12px; font-weight: 700; color: var(--navy); flex: 1; }
  .tray-src { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .del-btn { border: none; background: none; color: #b3261e; font-size: 14px; cursor: pointer; font-weight: 700; padding: 0 4px; }
  .tray-row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .tray-row input[type="text"] { flex: 1; min-width: 90px; }
  .tray-row .short { flex: 0 0 84px; min-width: 84px; }
  .tray-item textarea { font-size: 11.5px; margin-bottom: 6px; }
  .geo-row { display: flex; gap: 6px; align-items: center; }
  .geo-row input { flex: 1; }
  .geo-btn { font-size: 10px; font-weight: 700; border: 1px solid var(--border); background: #eef3fa; color: var(--navy-2); border-radius: 4px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  .geo-btn:hover { background: var(--navy-2); color: #fff; }
  .geo-status { font-size: 10px; color: var(--muted); }
  .lbl { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 4px 0 3px; }
  .empty-tray { padding: 26px; text-align: center; color: var(--muted); font-size: 12px; border: 1px dashed var(--border); border-radius: 6px; }

  .map-layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 950px) { .map-layout { grid-template-columns: 1fr; } }
  #map { height: 480px; border-radius: 0 0 6px 6px; }
  .map-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .doc-field { margin-bottom: 10px; }
  .doc-field input[type="text"] { width: 100%; }

  #topic-maps-wrap, #topic-images-wrap { margin-bottom: 20px; }
  .topic-maps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-top: 12px; }
  .topic-map-caption { font-size: 10px; font-weight: 700; color: var(--navy); text-align: center; margin-top: 5px; }
  .topic-map-empty { display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted); text-align: center; padding: 6px; }
  .topic-img-hint { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .topic-img-sec { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
  .topic-img-sec:first-child { border-top: none; padding-top: 0; margin-top: 0; }
  .topic-img-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .topic-img-name { font-size: 12px; font-weight: 700; color: var(--navy); }
  .topic-img-empty { font-size: 11px; color: var(--muted); }
  .topic-img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .topic-img-thumb { position: relative; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; aspect-ratio: 4/3; background: #eef2f7; }
  .topic-img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .topic-img-del { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%; border: none; background: rgba(16,41,74,0.75); color: #fff; font-size: 10px; font-weight: 700; cursor: pointer; line-height: 18px; padding: 0; }
  .topic-img-del:hover { background: #b3261e; }

  .gen-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
  .gen-btn { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; background: var(--navy-2); color: #fff; border: none; border-radius: 5px; padding: 10px 18px; cursor: pointer; }
  .gen-btn:hover { background: var(--navy); }
  .gen-btn:disabled { background: #9bb0c9; cursor: wait; }
  .gen-btn.secondary { background: #eef3fa; color: var(--navy-2); border: 1px solid var(--border); }
  .gen-btn.secondary:hover { background: var(--navy-2); color: #fff; }
  .draft-note { font-size: 10px; color: var(--muted); margin-left: auto; }

  .tpl-choice { display: flex; gap: 6px; }
  .tpl-opt { font-size: 11px; font-weight: 700; padding: 8px 14px; border-radius: 5px; border: 1px solid var(--border); cursor: pointer; color: var(--muted); background: #fff; }
  .tpl-opt.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  .footer { text-align: center; padding: 16px; font-size: 10px; color: #8a99ad; border-top: 1px solid var(--border); margin-top: 26px; }
  .loading { padding: 60px; text-align: center; color: var(--muted); font-size: 13px; letter-spacing: 1px; }

  .marker-pin { background: var(--navy-2); color: #fff; border: 2px solid #fff; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.4); font-family: 'Segoe UI', Calibri, sans-serif; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Briefing Builder</div>
    <div class="header-sub">Select events · build a map · add analyst comments · export HTML / PDF / PPTX · works fully offline</div>
  </div>
  <a class="back-link" href="index.html">← Dashboard</a>
</div>

<div class="wrap" id="app"><div class="loading">LOADING DATA…</div></div>
<div class="footer">Briefing Builder · drafts are saved in this browser automatically</div>

<script>
const THREAT = {
  CRITICAL: { color: '#b3261e', bg: '#fcebea', map: '#c0392b' },
  HIGH:     { color: '#c25600', bg: '#fdf0e3', map: '#e67e22' },
  MODERATE: { color: '#9a7b00', bg: '#fbf6e0', map: '#e3b505' },
  LOW:      { color: '#4f6b8f', bg: '#e9eff7', map: '#94b0c7' }
};
const LEVEL_NUM = { LOW: 1, MODERATE: 2, HIGH: 3, CRITICAL: 4 };
const GEO_NAME_MAP = { 'Gaza': 'West Bank' };
const REGION_BOUNDS = {
  'Middle East':    [[8, 0],     [42, 66]],
  'Ukraine/Russia': [[37, 18],   [62, 53]],
  'Sahel':          [[2, -18],   [24, 42]],
  'Asia-Pacific':   [[-12, 58],  [46, 148]],
  'Americas':       [[-22, -88], [26, -55]]
};
const DRAFT_KEY = 'briefing-builder-draft-v1';

let DATA, LIVE, GEO;
let map = null, markerLayer = null;
let srcMode = 'analysis';
let nextId = 1;

const BRIEF = {
  title: 'Intelligence Briefing',
  unit: '',
  period: '',
  classification: '',
  assessment: '',
  template: 'card',
  events: [],       // {id, num, text, date, type, country, region, source, url, comment, lat, lng, geoQuery}
  topicImages: {}   // { [topicName]: [{ dataUrl, name }] } — INTSUM only, one topic = one region page/slide
};

/* ---------- helpers ---------- */
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function makeBadge(threat) {
  const t = THREAT[threat] || THREAT.LOW;
  const b = el('span', 'badge', threat);
  b.style.background = t.bg; b.style.color = t.color; b.style.border = '1px solid ' + t.color + '44';
  return b;
}
function regionOf(countryName) {
  for (const r of DATA.regions) if (r.countries.some(c => c.name === countryName)) return r.name;
  return '';
}
function timeAgo(iso) {
  if (!iso) return '';
  const mins = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.round(hrs / 24) + 'd ago';
}
// Split a leading "12 Jul — " / "11-12 Jul —" date prefix off an analysis incident.
function splitIncident(text) {
  const m = /^([\d\-–, ]*\d{1,2}\s*(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*)\s*[—-]\s*(.*)$/s.exec(text.trim());
  if (m) return { date: m[1].trim(), text: m[2].trim() };
  return { date: '', text: text.trim() };
}
function isoToShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.getUTCDate() + ' ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()];
}

/* ---------- country centroids from world.geo.json ---------- */
const centroidCache = {};
function centroidOf(countryName) {
  const key = GEO_NAME_MAP[countryName] || countryName;
  if (centroidCache[key]) return centroidCache[key];
  const f = GEO.features.find(x => x.properties.name === key);
  if (!f) return { lat: 20, lng: 0 };
  let minLa = 90, maxLa = -90, minLo = 180, maxLo = -180;
  function walk(coords) {
    if (typeof coords[0] === 'number') {
      const lo = coords[0], la = coords[1];
      if (la < minLa) minLa = la; if (la > maxLa) maxLa = la;
      if (lo < minLo) minLo = lo; if (lo > maxLo) maxLo = lo;
    } else coords.forEach(walk);
  }
  walk(f.geometry.coordinates);
  const c = { lat: (minLa + maxLa) / 2, lng: (minLo + maxLo) / 2 };
  centroidCache[key] = c;
  return c;
}

/* ---------- draft persistence ---------- */
let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(DRAFT_KEY, JSON.stringify(BRIEF)); setDraftNote('Draft saved ' + new Date().toLocaleTimeString()); } catch (e) {}
  }, 400);
}
function setDraftNote(t) { const n = document.getElementById('draft-note'); if (n) n.textContent = t; }
function restoreDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    Object.assign(BRIEF, d);
    BRIEF.events = d.events || [];
    nextId = BRIEF.events.reduce((m, e) => Math.max(m, e.id), 0) + 1;
  } catch (e) {}
}
function exportDraft() {
  const blob = new Blob([JSON.stringify(BRIEF, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (BRIEF.title || 'briefing').replace(/\W+/g, '_') + '.briefing.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importDraft(file) {
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const d = JSON.parse(rd.result);
      if (!Array.isArray(d.events)) throw new Error('invalid');
      Object.assign(BRIEF, d);
      nextId = BRIEF.events.reduce((m, e) => Math.max(m, e.id), 0) + 1;
      renderAll(); save();
    } catch (e) { alert('Ongeldig briefing-bestand.'); }
  };
  rd.readAsText(file);
}
function clearDraft() {
  if (!confirm('Briefing leegmaken? Dit verwijdert alle geselecteerde events en teksten.')) return;
  BRIEF.title = 'Intelligence Briefing'; BRIEF.unit = ''; BRIEF.period = DATA.period;
  BRIEF.classification = DATA.classification; BRIEF.assessment = ''; BRIEF.events = [];
  BRIEF.topicImages = {};
  renderAll(); save();
}

/* ---------- event management ---------- */
function eventKey(text, country) { return (country + '|' + text.slice(0, 80)).toLowerCase(); }
function inTray(text, country) { return BRIEF.events.some(e => eventKey(e.text, e.country) === eventKey(text, country)); }

function addEvent(o) {
  const c = centroidOf(o.country || '');
  BRIEF.events.push({
    id: nextId++,
    text: o.text, date: o.date || '', type: o.type || '',
    country: o.country || '', region: o.region || regionOf(o.country || ''),
    source: o.source, url: o.url || '', comment: '',
    // lat/lng still computed for data-model consistency, but COA items are never
    // drawn as a pin (see renderMarkers/captureMap/captureTopicMap) — a 90-day
    // outlook is a strategic assessment, not a located incident.
    lat: o.lat != null ? o.lat : c.lat, lng: o.lng != null ? o.lng : c.lng,
    geoQuery: '', isCoa: !!o.isCoa
  });
  renderTray(); renderMarkers(); renderSources(); renderTopicImages(); save();
}
function removeEvent(id) {
  BRIEF.events = BRIEF.events.filter(e => e.id !== id);
  renderTray(); renderMarkers(); renderSources(); renderTopicImages(); save();
}

/* ---------- topic images (INTSUM) ----------
   One topic = one region among the currently selected events. Each topic gets its
   own page (HTML/PDF) or slide(s) (PPTX) in the INTSUM template; images attached
   here appear on that topic's page. Images are downscaled client-side (canvas) so
   drafts stay small in localStorage and exports stay a reasonable file size — this
   never touches the network, works fully offline. */
function topicsFromEvents() {
  return [...new Set(BRIEF.events.map(e => e.region || 'Other'))];
}
function readAndDownscaleImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1400;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxDim || h > maxDim) {
          const scale = maxDim / Math.max(w, h);
          w = Math.round(w * scale); h = Math.round(h * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve({ dataUrl: canvas.toDataURL('image/jpeg', 0.85), w, h });
      };
      img.onerror = () => reject(new Error('kon afbeelding niet lezen'));
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function addTopicImages(topic, fileList) {
  if (!fileList || !fileList.length) return;
  if (!BRIEF.topicImages[topic]) BRIEF.topicImages[topic] = [];
  for (const file of fileList) {
    if (!file.type.startsWith('image/')) continue;
    try {
      const { dataUrl, w, h } = await readAndDownscaleImage(file);
      BRIEF.topicImages[topic].push({ dataUrl, name: file.name, w, h });
    } catch (e) { /* skip unreadable file */ }
  }
  renderTopicImages(); save();
}
function removeTopicImage(topic, idx) {
  if (!BRIEF.topicImages[topic]) return;
  BRIEF.topicImages[topic].splice(idx, 1);
  renderTopicImages(); save();
}
function renderTopicImages() {
  // Topic Maps box shares the same INTSUM-only visibility; its preview goes stale
  // whenever the topic set changes, so clear it here rather than risk a mismatched
  // preview lingering on screen (preview and output must never diverge).
  const mapsWrap = document.getElementById('topic-maps-wrap');
  if (mapsWrap) mapsWrap.style.display = BRIEF.template === 'intsum' ? '' : 'none';
  const mapsList = document.getElementById('topic-maps-list');
  if (mapsList) mapsList.innerHTML = '';

  const wrap = document.getElementById('topic-images-wrap');
  if (!wrap) return;
  if (BRIEF.template !== 'intsum') { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  const body = document.getElementById('topic-images-list');
  body.innerHTML = '';
  const topics = topicsFromEvents();
  if (!topics.length) {
    body.appendChild(el('div', 'empty-tray', 'Selecteer eerst events — foto’s worden per topic (regio) toegevoegd.'));
    return;
  }
  topics.forEach(topic => {
    const sec = el('div', 'topic-img-sec');
    const head = el('div', 'topic-img-head');
    head.appendChild(el('span', 'topic-img-name', topic));
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
    input.id = 'topicfile-' + topic.replace(/\W+/g, '_');
    input.style.display = 'none';
    input.onchange = () => { addTopicImages(topic, input.files); input.value = ''; };
    const addBtn = el('button', 'geo-btn', '+ Foto’s toevoegen');
    addBtn.onclick = () => input.click();
    head.appendChild(addBtn); head.appendChild(input);
    sec.appendChild(head);

    const imgs = BRIEF.topicImages[topic] || [];
    if (imgs.length) {
      const grid = el('div', 'topic-img-grid');
      imgs.forEach((im, i) => {
        const thumb = el('div', 'topic-img-thumb');
        const img = document.createElement('img');
        img.src = im.dataUrl; img.title = im.name;
        thumb.appendChild(img);
        const del = el('button', 'topic-img-del', '✕');
        del.title = 'Verwijderen';
        del.onclick = () => removeTopicImage(topic, i);
        thumb.appendChild(del);
        grid.appendChild(thumb);
      });
      sec.appendChild(grid);
    } else {
      sec.appendChild(el('div', 'topic-img-empty', 'Nog geen foto’s voor dit topic.'));
    }
    body.appendChild(sec);
  });
}

/* ---------- geocoding (best-effort online lookup — NOT required, this tool is offline-first) ---------
   Primary offline workflow: drag the pin on the map, or type exact lat/lng below.
   This place-name search is a convenience that only works when internet happens to be
   available; it fails fast (short timeout) and never blocks the offline workflow. */
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(t));
}
async function geocode(q) {
  try {
    const r = await fetchWithTimeout('https://photon.komoot.io/api/?q=' + encodeURIComponent(q) + '&limit=1', 3500);
    if (r.ok) {
      const j = await r.json();
      if (j.features && j.features.length) {
        const [lng, lat] = j.features[0].geometry.coordinates;
        return { lat, lng, label: j.features[0].properties.name || q };
      }
    }
  } catch (e) {}
  try {
    const r = await fetchWithTimeout('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q), 3500);
    if (r.ok) {
      const j = await r.json();
      if (j.length) return { lat: +j[0].lat, lng: +j[0].lon, label: j[0].display_name.split(',')[0] };
    }
  } catch (e) {}
  return null;
}
async function geoLookup(id) {
  const ev = BRIEF.events.find(e => e.id === id);
  if (!ev) return;
  const input = document.getElementById('geo-' + id);
  const status = document.getElementById('geostat-' + id);
  const q = (input.value || '').trim();
  if (!q) return;
  status.textContent = 'online zoeken (optioneel)…';
  const hit = await geocode(q + (ev.country ? ', ' + ev.country : ''));
  if (hit) {
    ev.lat = hit.lat; ev.lng = hit.lng; ev.geoQuery = q;
    status.textContent = '✓ ' + hit.label;
    syncLatLngInputs(ev.id);
    renderMarkers(); fitToPins(); save();
  } else {
    status.textContent = 'geen internet of niet gevonden — sleep de pin of vul lat/lng in';
  }
}
function setManualLatLng(id, latStr, lngStr) {
  const ev = BRIEF.events.find(e => e.id === id);
  if (!ev) return;
  const lat = parseFloat(latStr), lng = parseFloat(lngStr);
  if (isNaN(lat) || isNaN(lng)) return;
  ev.lat = Math.max(-85, Math.min(85, lat));
  ev.lng = Math.max(-180, Math.min(180, lng));
  renderMarkers(); save();
}
function syncLatLngInputs(id) {
  const ev = BRIEF.events.find(e => e.id === id);
  const la = document.getElementById('lat-' + id), lo = document.getElementById('lng-' + id);
  if (ev && la && lo) { la.value = ev.lat.toFixed(4); lo.value = ev.lng.toFixed(4); }
}

/* ---------- map ---------- */
// No tile server: this tool must work fully offline. The basemap is drawn from the
// already-local world.geo.json as vector country outlines — nothing to fetch at
// draw-time, and no cross-origin raster tiles to taint the export canvas either.
function initMap() {
  // Animation disabled: captureMap() reads the map's projection synchronously right
  // after a view change, so the view must settle instantly — no mid-flight capture.
  map = L.map('map', { preferCanvas: true, worldCopyJump: true, minZoom: 2, zoomAnimation: false, fadeAnimation: false, markerZoomAnimation: false });
  L.geoJSON(GEO, {
    style: () => ({ fillColor: '#e3e9f2', fillOpacity: 1, color: '#c3d0e0', weight: 1 })
  }).addTo(map);
  map.setView([22, 15], 2);
  markerLayer = L.layerGroup().addTo(map);
}
function renderMarkers() {
  if (!map) return;
  markerLayer.clearLayers();
  // COA/outlook items are a strategic assessment, not a located event — no map pin.
  BRIEF.events.forEach(ev => {
    if (ev.isCoa) return;
    const icon = L.divIcon({ className: '', html: '<div class="marker-pin">' + ev.num + '</div>', iconSize: [26, 26], iconAnchor: [13, 13] });
    const m = L.marker([ev.lat, ev.lng], { icon, draggable: true });
    m.bindTooltip((ev.date ? ev.date + ' — ' : '') + ev.text.slice(0, 60));
    m.on('dragend', () => { const p = m.getLatLng(); ev.lat = p.lat; ev.lng = p.lng; syncLatLngInputs(ev.id); save(); });
    markerLayer.addLayer(m);
  });
}
function fitToPins() {
  const pinned = BRIEF.events.filter(e => !e.isCoa);
  if (!pinned.length) return;
  const b = L.latLngBounds(pinned.map(e => [e.lat, e.lng]));
  map.fitBounds(b.pad(0.35), { animate: false });
}
function applyRegionPreset() {
  const v = document.getElementById('map-preset').value;
  if (v === 'pins') fitToPins();
  else if (REGION_BOUNDS[v]) map.fitBounds(REGION_BOUNDS[v], { animate: false });
  else map.setView([22, 15], 2, { animate: false });
}

/* ---------- map capture (shared by HTML/PDF and PPTX) ----------
   No raster tiles and no leaflet-image dependency (that library predates Leaflet 1.x
   and crashes against it) — we draw the already-local GEO polygons and pins onto our
   own canvas using Leaflet's own projection (map.latLngToContainerPoint), matching
   exactly what's on screen. Fully deterministic, fully offline, no external library. */
function projectRing(ring) {
  return ring.map(([lng, lat]) => map.latLngToContainerPoint([lat, lng]));
}
function tracePolygon(ctx, coords) {
  coords.forEach(ring => {
    const pts = projectRing(ring);
    if (!pts.length) return;
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
  });
}
// Draws GEO country outlines + numbered pins onto a context already sized/scaled by
// the caller. `pins` is [{ev, num}] — only these get drawn, with the given number
// (lets callers use global tray numbers OR a topic-local 1..n renumbering).
function drawGeoAndPins(ctx, w, h, pins) {
  ctx.fillStyle = '#f3f5f9';
  ctx.fillRect(0, 0, w, h);

  GEO.features.forEach(f => {
    const geom = f.geometry;
    if (!geom) return;
    ctx.beginPath();
    if (geom.type === 'Polygon') tracePolygon(ctx, geom.coordinates);
    else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => tracePolygon(ctx, poly));
    else return;
    ctx.fillStyle = '#e3e9f2';
    ctx.fill('evenodd');
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#c3d0e0';
    ctx.stroke();
  });

  pins.forEach(({ ev, num }) => {
    const pt = map.latLngToContainerPoint([ev.lat, ev.lng]);
    if (pt.x < -20 || pt.y < -20 || pt.x > w + 20 || pt.y > h + 20) return;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 12, 0, Math.PI * 2);
    ctx.fillStyle = '#1d4e89';
    ctx.fill();
    ctx.lineWidth = 2.5; ctx.strokeStyle = '#ffffff'; ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 13px Segoe UI, Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(num), pt.x, pt.y + 0.5);
  });
}
// Renders whatever view the interactive map is CURRENTLY at to a PNG data URL.
function renderMapToPng(pins) {
  return new Promise((resolve) => {
    if (!map || !GEO) return resolve(null);
    try {
      const container = map.getContainer();
      const w = container.clientWidth, h = container.clientHeight;
      if (!w || !h) return resolve(null);
      const scale = 2; // sharp output for PPTX/print
      const canvas = document.createElement('canvas');
      canvas.width = w * scale; canvas.height = h * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      drawGeoAndPins(ctx, w, h, pins);
      resolve(canvas.toDataURL('image/png'));
    } catch (e) { resolve(null); }
  });
}
// Incident Card / overview map: all non-COA events at their existing tray numbers
// (ev.num, assigned in renderTray()), on whatever view the map is currently at.
function captureMap() {
  const pins = BRIEF.events.filter(e => !e.isCoa).map(ev => ({ ev, num: ev.num }));
  return renderMapToPng(pins);
}

const MIN_TOPIC_SPAN = 5; // degrees — stops a single/near-collocated pin from over-zooming
function numberLocally(events) {
  const out = new Map();
  let n = 0;
  events.forEach(ev => out.set(ev.id, ++n));
  return out;
}
// "Capture mode": moves the map to frame `topic`'s own events, captures a PNG, and
// returns both the image and the local 1..n numbering used — callers reuse that
// numbering so the topic's text list matches pins on its own map exactly.
async function captureTopicMap(topic) {
  const evts = BRIEF.events.filter(e => (e.region || 'Other') === topic && !e.isCoa);
  if (evts.length) {
    let bounds = L.latLngBounds(evts.map(e => [e.lat, e.lng]));
    const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();
    if ((ne.lat - sw.lat) < MIN_TOPIC_SPAN || (ne.lng - sw.lng) < MIN_TOPIC_SPAN) {
      const cLat = (ne.lat + sw.lat) / 2, cLng = (ne.lng + sw.lng) / 2;
      bounds = L.latLngBounds(
        [cLat - MIN_TOPIC_SPAN / 2, cLng - MIN_TOPIC_SPAN / 2],
        [cLat + MIN_TOPIC_SPAN / 2, cLng + MIN_TOPIC_SPAN / 2]
      );
    }
    map.fitBounds(bounds.pad(0.25), { animate: false });
  } else if (REGION_BOUNDS[topic]) {
    map.fitBounds(REGION_BOUNDS[topic], { animate: false });
  } else {
    map.setView([20, 0], 2, { animate: false });
  }
  const localNums = numberLocally(evts);
  const pins = evts.map(ev => ({ ev, num: localNums.get(ev.id) }));
  const png = await renderMapToPng(pins);
  return { png, localNums };
}
// Runs captureTopicMap() for every topic in sequence, then restores the interactive
// map to its normal "fit all pins" view. Shared by the preview button and generation.
async function captureAllTopicMaps() {
  const result = {};
  for (const topic of topicsFromEvents()) {
    result[topic] = await captureTopicMap(topic);
  }
  fitToPins();
  return result;
}
// "Preview topic maps" button: runs the exact same capture-mode sequence used at
// generation time and shows the results as thumbnails, so the analyst can sanity-check
// framing before committing to HTML/PDF or PPTX — preview and output can never diverge.
async function previewTopicMaps() {
  if (!BRIEF.events.length) { alert('Selecteer eerst events.'); return; }
  const btn = document.getElementById('btn-preview-maps');
  const list = document.getElementById('topic-maps-list');
  btn.disabled = true; btn.textContent = 'Kaarten vastleggen…';
  const results = await captureAllTopicMaps();
  btn.disabled = false; btn.textContent = '🗺 Preview topic maps';
  if (!list) return;
  list.innerHTML = '';
  Object.keys(results).forEach(topic => {
    const item = el('div');
    const thumb = el('div', 'topic-img-thumb');
    if (results[topic] && results[topic].png) {
      const img = document.createElement('img');

      thumb.appendChild(img);
    } else {
      thumb.appendChild(el('div', 'topic-map-empty', 'kaart niet beschikbaar'));
    }
    item.appendChild(thumb);
    item.appendChild(el('div', 'topic-map-caption', topic));
    list.appendChild(item);
  });
}

// COA/90-day outlook items: unnumbered, one labeled box per country, appended after
// the numbered incident list on that scope's page (topic page, or the Card's page).

  let h = '<h2 style="margin-top:16px">COA · 90-day Outlook</h2>';
  events.forEach(ev => {
    h += '<div style="margin-bottom:10px"><div style="font-weight:700;color:#10294a;font-size:11px;margin-bottom:4px">' +
      esc(ev.country || '') + '</div><div class="assess">' + esc(ev.text) + '</div>';
    if (ev.comment) h += '<div class="evt-com">' + esc(ev.comment) + '</div>';
    h += '</div>';
  });
  return h;
}

function briefHeaderHtml() {
  return '<div class="classif-banner">' + esc(BRIEF.classification || '') + '</div>' +
    '<div class="ph"><div><div class="ph-title">' + esc(BRIEF.title || 'Intelligence Briefing') + '</div>' +

async function generateHtml() {
  if (!BRIEF.events.length) { alert('Selecteer eerst events.'); return; }
  const btn = document.getElementById('btn-html');
  btn.disabled = true;
  btn.textContent = BRIEF.template === 'card' ? 'Kaart vastleggen…' : 'Kaarten per topic vastleggen…';

  let body = '';
  if (BRIEF.template === 'card') {
    // Incident Card: single page by design (matches the real-world "1-slide" product).
    const png = await captureMap();
    const located = BRIEF.events.filter(e => !e.isCoa);
    body += briefHeaderHtml();
    body += mapImgHtml(png);
    if (located.length) {
      body += '<h2>Events</h2>';
      located.forEach(ev => body += evtHtml(ev, ev.num));
    }
    body += coaEventsHtml(BRIEF.events.filter(e => e.isCoa));
    if (BRIEF.assessment) body += '<h2>Analyst Assessment</h2><div class="assess">' + esc(BRIEF.assessment) + '</div>';
    body += briefFooterHtml();
  } else {
    // INTSUM: cover page → one page per topic (own map + incidents + COA + imagery) → assessment page.
    // "Capture mode": the map is moved to each topic's own framing and captured in turn.
    const topicMaps = await captureAllTopicMaps();
    body += intsumCoverHtml();

    topicsFromEvents().forEach(topic => {
      const tm = topicMaps[topic] || {};
      const localNums = tm.localNums || new Map();
      const topicLocated = BRIEF.events.filter(ev => (ev.region || 'Other') === topic && !ev.isCoa);
      const topicCoas = BRIEF.events.filter(ev => (ev.region || 'Other') === topic && ev.isCoa);

      body += '<div class="page-break">' + runningHeaderHtml() + '<h2>' + esc(topic) + '</h2>';
      body += mapImgHtml(tm.png);
      if (topicLocated.length) {
        body += '<h2 style="margin-top:16px">Key Incidents</h2>';
        topicLocated.forEach(ev => body += evtHtml(ev, localNums.get(ev.id)));
      }
      body += coaEventsHtml(topicCoas);
      const photos = topicImagesHtml(topic);
      if (photos) body += '<h2 style="margin-top:16px">Imagery</h2>' + photos;
      body += '</div>';
    });

    if (BRIEF.assessment) {
      body += '<div class="page-break">' + runningHeaderHtml() +
        '<h2>Assessment / Outlook</h2><div class="assess">' + esc(BRIEF.assessment) + '</div></div>';
    }
    body += briefFooterHtml();
  }

  btn.disabled = false; btn.textContent = '⎙ HTML / PDF';

  const w = window.open('', '_blank');
  if (!w) { alert('Pop-up geblokkeerd — sta pop-ups toe.'); return; }
  w.document.open();
  w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + esc(BRIEF.title) +
    '</title><style>' + PRINT_CSS + '</style></head><body>' +
    '<div class="noprint"><button onclick="window.print()">⎙ Save as PDF / Print</button></div>' +
    body + '</body></html>');
  w.document.close();
  w.focus();
}

/* ---------- PPTX output ---------- */
const PPT = {
  navy: '10294A', navy2: '1D4E89', text: '22324A', muted: '5D6F88',
  border: 'D9E1EC', bgLight: 'F5F8FC', classif: '8A5A00'
};

function pptClassifBanners(slide) {
  const c = BRIEF.classification || '';
  if (!c) return;
  slide.addText(c, { x: 0, y: 0.02, w: 13.33, h: 0.28, align: 'center', fontSize: 9, bold: true, color: PPT.classif });
  slide.addText(c, { x: 0, y: 7.2, w: 13.33, h: 0.28, align: 'center', fontSize: 9, bold: true, color: PPT.classif });
}
// localNums (optional): Map(eventId -> topic-local number). Omit to use the event's
// own global tray number (ev.num) — used for the Incident Card's single combined list.
function pptEvtLines(events, localNums) {
  const lines = [];
  events.forEach(ev => {
    const num = localNums ? localNums.get(ev.id) : ev.num;
    const head = (num ? num + '. ' : '') + (ev.date || '') + (ev.type ? ' (' + ev.type + ')' : '');
    lines.push({ text: head + (head.trim() ? ': ' : ''), options: { bold: true, color: PPT.navy, fontSize: 11, breakLine: false } });
    lines.push({ text: ev.text + (ev.country ? '  — ' + ev.country : ''), options: { color: PPT.text, fontSize: 11, breakLine: true } });
    if (ev.comment) lines.push({ text: '     ▸ ' + ev.comment, options: { italic: true, color: PPT.muted, fontSize: 10.5, breakLine: true } });
    lines.push({ text: '', options: { fontSize: 4, breakLine: true } });
  });
  return lines;
}
// COA/90-day outlook text runs: unnumbered, one country label + italic outlook per
// entry. `withHeading` adds a small section title (used when appended to the Card's
// shared event-list text box; INTSUM instead gives COA its own titled slide).
function coaPptLines(events, withHeading) {
  const lines = [];
  if (withHeading && events.length) {
    lines.push({ text: 'COA · 90-DAY OUTLOOK', options: { bold: true, color: PPT.navy2, fontSize: 10.5, breakLine: true } });
  }
  events.forEach(ev => {
    lines.push({ text: (ev.country || ''), options: { bold: true, color: PPT.navy2, fontSize: 11, breakLine: true } });
    lines.push({ text: ev.text, options: { italic: true, color: PPT.text, fontSize: 10.5, breakLine: true } });
    if (ev.comment) lines.push({ text: '▸ ' + ev.comment, options: { italic: true, color: PPT.muted, fontSize: 10, breakLine: true } });
    lines.push({ text: '', options: { fontSize: 4, breakLine: true } });
  });
  return lines;
}
// Dedicated "COA · 90-day Outlook" slide for a topic (INTSUM) — omitted if the topic
// has no COA items selected.
function addCoaSlide(pptx, topic) {
  const coas = BRIEF.events.filter(e => (e.region || 'Other') === topic && e.isCoa);
  if (!coas.length) return;
  const s = pptx.addSlide();
  pptClassifBanners(s);
  s.addText(topic.toUpperCase() + ' — COA · 90-DAY OUTLOOK', { x: 0.3, y: 0.4, w: 12.7, h: 0.5, fontSize: 16, bold: true, color: PPT.navy });
  s.addText(coaPptLines(coas, false), { x: 0.3, y: 1.05, w: 12.73, h: 6.0, valign: 'top', fill: { color: PPT.bgLight }, line: { color: PPT.border } });
}
// One or more dedicated "Imagery" slides per topic (2x2 photo grid, paginated at 4/slide).
function addImagerySlides(pptx, topic) {
  const imgs = (BRIEF.topicImages && BRIEF.topicImages[topic]) || [];
  if (!imgs.length) return;
  const perSlide = 4, cols = 2, gap = 0.18;
  const areaX = 0.5, areaY = 1.05, areaW = 12.33, areaH = 5.85;
  const cellW = (areaW - gap * (cols - 1)) / cols;
  for (let off = 0; off < imgs.length; off += perSlide) {
    const batch = imgs.slice(off, off + perSlide);
    const rows = Math.ceil(batch.length / cols);
    const cellH = (areaH - gap * (rows - 1)) / Math.max(rows, 1);
    const s = pptx.addSlide();
    pptClassifBanners(s);
    s.addText(topic.toUpperCase() + ' — IMAGERY' + (imgs.length > perSlide ? ' (' + (off / perSlide + 1) + ')' : ''),
      { x: 0.3, y: 0.4, w: 12.7, h: 0.5, fontSize: 16, bold: true, color: PPT.navy });
    batch.forEach((im, idx) => {
      const col = idx % cols, row = Math.floor(idx / cols);
      const x = areaX + col * (cellW + gap);
      const y = areaY + row * (cellH + gap);
      s.addImage({ data: im.dataUrl, x, y, w: cellW, h: cellH, sizing: { type: 'cover', w: cellW, h: cellH } });
    });
  }
}

async function generatePptx() {
  if (!BRIEF.events.length) { alert('Selecteer eerst events.'); return; }
  const btn = document.getElementById('btn-pptx');
  btn.disabled = true; btn.textContent = 'Genereren…';
  try {
    const pptx = new PptxGenJS();
    pptx.defineLayout({ name: 'WIDE', width: 13.33, height: 7.5 });
    pptx.layout = 'WIDE';

    if (BRIEF.template === 'card') {
      // ----- Incident Card: one slide, combined map + list (design stays as-is) -----
      const png = await captureMap();
      const located = BRIEF.events.filter(e => !e.isCoa);
      const coas = BRIEF.events.filter(e => e.isCoa);
      const s = pptx.addSlide();
      pptClassifBanners(s);
      s.addShape('rect', { x: 0, y: 0.35, w: 13.33, h: 0.7, fill: { color: PPT.navy } });
      s.addText(BRIEF.title || 'Incident Card', { x: 0.3, y: 0.35, w: 9.4, h: 0.7, fontSize: 20, bold: true, color: 'FFFFFF' });
      s.addText((BRIEF.unit ? BRIEF.unit + '  ·  ' : '') + (BRIEF.period || ''), { x: 9.6, y: 0.35, w: 3.5, h: 0.7, align: 'right', fontSize: 11, color: 'CFE0F5' });
      if (png) s.addImage({ data: png, x: 0.3, y: 1.2, w: 7.9, h: 5.4 });
      else s.addText('Kaart niet beschikbaar — plak hier een schermafdruk.', { x: 0.3, y: 1.2, w: 7.9, h: 5.4, align: 'center', fontSize: 12, color: PPT.muted, fill: { color: PPT.bgLight }, line: { color: PPT.border } });
      s.addText([...pptEvtLines(located), ...coaPptLines(coas, true)], { x: 8.35, y: 1.2, w: 4.68, h: 5.4, valign: 'top', fill: { color: 'FFFFFF' }, line: { color: PPT.border } });
      if (BRIEF.assessment) {
        s.addText([{ text: 'ANALYST ASSESSMENT:  ', options: { bold: true, color: PPT.navy2, fontSize: 10.5 } },
                   { text: BRIEF.assessment, options: { italic: true, color: PPT.text, fontSize: 10.5 } }],
          { x: 0.3, y: 6.72, w: 12.73, h: 0.55, valign: 'top', fill: { color: PPT.bgLight }, line: { color: PPT.border } });
      }
    } else {
      // ----- INTSUM: title → per-topic (own map → incidents → COA → imagery) → assessment -----
      // "Capture mode": the interactive map is moved to each topic's own framing and
      // captured in turn, then restored — see captureAllTopicMaps().
      btn.textContent = 'Kaarten per topic vastleggen…';
      const topicMaps = await captureAllTopicMaps();
      btn.textContent = 'Genereren…';

      const t = pptx.addSlide();
      pptClassifBanners(t);
      t.addText('INTELLIGENCE SUMMARY', { x: 0.6, y: 2.15, w: 12.1, h: 0.4, fontSize: 13, bold: true, color: PPT.navy2, charSpacing: 2 });
      t.addShape('rect', { x: 0, y: 2.6, w: 13.33, h: 1.6, fill: { color: PPT.navy } });
      t.addText(BRIEF.title || 'INTSUM', { x: 0.6, y: 2.7, w: 12.1, h: 0.9, fontSize: 30, bold: true, color: 'FFFFFF' });
      t.addText((BRIEF.unit ? BRIEF.unit + '  ·  ' : '') + (BRIEF.period || ''), { x: 0.6, y: 3.5, w: 12.1, h: 0.5, fontSize: 14, color: 'CFE0F5' });
      t.addText('Generated: ' + new Date().toUTCString(), { x: 0.6, y: 6.5, w: 12.1, h: 0.4, fontSize: 10, color: PPT.muted });

      topicsFromEvents().forEach(rn => {
        const tm = topicMaps[rn] || {};
        const localNums = tm.localNums || new Map();
        const evts = BRIEF.events.filter(e => (e.region || 'Other') === rn && !e.isCoa);

        const mapSlide = pptx.addSlide();
        pptClassifBanners(mapSlide);
        mapSlide.addText(rn.toUpperCase(), { x: 0.3, y: 0.4, w: 12.7, h: 0.5, fontSize: 16, bold: true, color: PPT.navy });
        if (tm.png) mapSlide.addImage({ data: tm.png, x: 0.9, y: 1.0, w: 11.5, h: 5.9 });
        else mapSlide.addText('Kaart niet beschikbaar.', { x: 0.9, y: 1.0, w: 11.5, h: 5.9, align: 'center', fontSize: 12, color: PPT.muted, fill: { color: PPT.bgLight }, line: { color: PPT.border } });

        for (let off = 0; off < evts.length; off += 6) {
          const s = pptx.addSlide();
          pptClassifBanners(s);
          s.addText(rn.toUpperCase() + ' — KEY INCIDENTS' + (off ? ' (vervolg)' : ''), { x: 0.3, y: 0.4, w: 12.7, h: 0.5, fontSize: 16, bold: true, color: PPT.navy });
          s.addText(pptEvtLines(evts.slice(off, off + 6), localNums), { x: 0.3, y: 1.05, w: 12.73, h: 6.0, valign: 'top' });
        }
        addCoaSlide(pptx, rn);
        addImagerySlides(pptx, rn);
      });

      if (BRIEF.assessment) {
        const a = pptx.addSlide();
        pptClassifBanners(a);
        a.addText('ASSESSMENT / OUTLOOK', { x: 0.3, y: 0.4, w: 12.7, h: 0.5, fontSize: 16, bold: true, color: PPT.navy });
        a.addText(BRIEF.assessment, { x: 0.3, y: 1.05, w: 12.73, h: 5.9, valign: 'top', italic: true, fontSize: 13, color: PPT.text, fill: { color: PPT.bgLight }, line: { color: PPT.border } });
      }
    }

    await pptx.writeFile({ fileName: (BRIEF.title || 'briefing').replace(/\W+/g, '_') + '.pptx' });
  } catch (e) {
    alert('PPTX-generatie mislukt: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '⬇ PPTX';
  }
}

  }
  tCard.onclick = () => { BRIEF.template = 'card'; syncTpl(); renderTopicImages(); save(); };
  tSum.onclick = () => { BRIEF.template = 'intsum'; syncTpl(); renderTopicImages(); save(); };
  syncTpl();
  tpl.appendChild(tCard); tpl.appendChild(tSum);
  bar.appendChild(tpl);

  const htmlBtn = el('button', 'gen-btn', '⎙ HTML / PDF'); htmlBtn.id = 'btn-html'; htmlBtn.onclick = generateHtml;
  const pptBtn = el('button', 'gen-btn', '⬇ PPTX'); pptBtn.id = 'btn-pptx'; pptBtn.onclick = generatePptx;
  bar.appendChild(htmlBtn); bar.appendChild(pptBtn);

  const expBtn = el('button', 'gen-btn secondary', 'Export .json'); expBtn.onclick = exportDraft;
  const impBtn = el('button', 'gen-btn secondary', 'Import .json');
  const impInput = document.createElement('input'); impInput.type = 'file'; impInput.accept = '.json'; impInput.style.display = 'none';
  impInput.onchange = () => { if (impInput.files[0]) importDraft(impInput.files[0]); impInput.value = ''; };
  impBtn.onclick = () => impInput.click();
  const clrBtn = el('button', 'gen-btn secondary', 'Leegmaken'); clrBtn.onclick = clearDraft;
  bar.appendChild(expBtn); bar.appendChild(impBtn); bar.appendChild(impInput); bar.appendChild(clrBtn);

  const note = el('span', 'draft-note', ''); note.id = 'draft-note';
  bar.appendChild(note);
  app.appendChild(bar);
}

function renderAll() {
  renderApp();
  fillCountryFilter();
  renderSources();
  renderTray();
  renderTopicImages();
  initMapOnce();
  renderMarkers();
  if (BRIEF.events.length) fitToPins();
}
let mapInited = false;
function initMapOnce() {
  // renderApp() fully rebuilds the DOM (e.g. after importDraft()), which replaces
  // #map with a fresh, disconnected element — a live Leaflet instance left bound to
  // the old node renders nothing and captureMap() silently fails. Detect that and
  // recreate the map cleanly against the new container.
  if (mapInited && map && map.getContainer() && map.getContainer().isConnected) {
    map.invalidateSize();
    return;
  }
  if (map) { try { map.remove(); } catch (e) {} }
  initMap();
  mapInited = true;
}

/* ---------- boot ---------- */
async function load() {
  try {
    const bust = '?t=' + Date.now();
    const [dataRes, geoRes, liveRes] = await Promise.all([
      fetch('data.json' + bust, { cache: 'no-store' }),
      fetch('world.geo.json'),
      fetch('live.json' + bust, { cache: 'no-store' }).catch(() => null)
    ]);
    DATA = await dataRes.json();
    GEO = await geoRes.json();
    LIVE = (liveRes && liveRes.ok) ? await liveRes.json() : { countries: {} };
  } catch (e) {
    // Most common offline cause: the page was opened directly as a file (file://),
    // where browsers block fetch() of local JSON for security reasons. Fix: serve
    // the public/ folder over a local server, e.g. `npx http-server public -p 5173`
    // (see .claude/launch.json — the "intel-dashboard" config already does this).
    document.getElementById('app').innerHTML =
      '<div class="loading">DATA KON NIET GELADEN WORDEN<br><br>' +
      '<span style="font-size:11px;letter-spacing:0;text-transform:none">' +
      'Open deze pagina via een lokale server, niet als los bestand ' +
      '(bv. <code>npx http-server public -p 5173</code>), en zorg dat data.json / ' +
      'world.geo.json / vendor/ naast builder.html staan.</span></div>';
    return;
  }
  if (!BRIEF.period) BRIEF.period = DATA.period;
  if (!BRIEF.classification) BRIEF.classification = DATA.classification;
  restoreDraft();
  if (!BRIEF.period) BRIEF.period = DATA.period;
  if (!BRIEF.classification) BRIEF.classification = DATA.classification;
  renderAll();
}
load();
</script>
