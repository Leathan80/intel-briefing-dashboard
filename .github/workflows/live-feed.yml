name: Live feed

# The hourly trigger is driven externally by cron-job.org, which calls the
# workflow_dispatch API on a precise schedule (GitHub's own cron is best-effort
# and drops runs under load). This internal schedule is only a once-a-day
# fallback heartbeat in case the external trigger ever stops.
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The daily analysis run deploys from the local machine, so the live site
      # always has the newest data.json/history.json. Pull those in first so
      # this deploy never overwrites them with stale repo copies. The current
      # live.json comes along too, so failed countries keep their last feed.
      - name: Sync latest data from live site
        run: |
          curl -sf https://intel-briefing-dashboard.web.app/data.json -o public/data.json
          curl -sf https://intel-briefing-dashboard.web.app/history.json -o public/history.json
          curl -sf https://intel-briefing-dashboard.web.app/live.json -o public/live.json || true

      - name: Crawl live headlines (Google News)
        run: node crawler/crawl.js

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: intel-briefing-dashboard
