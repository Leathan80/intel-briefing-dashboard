name: Hourly live feed

on:
  schedule:
    - cron: "12 * * * *"
  workflow_dispatch:

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The daily analysis run deploys from the local machine, so the live site
      # always has the newest data.json/history.json. Pull those in first so
      # this deploy never overwrites them with stale repo copies.
      - name: Sync latest analysis data from live site
        run: |
          curl -sf https://intel-briefing-dashboard.web.app/data.json -o public/data.json
          curl -sf https://intel-briefing-dashboard.web.app/history.json -o public/history.json

      - name: Crawl live headlines (GDELT)
        run: node crawler/crawl.js

      - name: Prepare deploy credentials
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx -y firebase-tools deploy --only hosting --project intel-briefing-dashboard --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
